<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>우리집 수학 에이스</title>
    <meta name="theme-color" content="#0284c7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="수학 에이스" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/svg+xml" href="icon.svg?v=3" />
    <link rel="apple-touch-icon" href="icon.svg?v=3" />
    <link rel="manifest" href="manifest.json?v=3" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js?v=3')
            .then(reg => console.log('SW registered:', reg))
            .catch(err => console.log('SW failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="loading-fallback" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: white; font-family: sans-serif; z-index: 9999;">
      <div style="text-align: center;">
        <h2 style="color: #0284c7;">수학 에이스 로딩 중... (v3)</h2>
        <p style="color: #64748b;">잠시만 기다려 주세요.</p>
      </div>
    </div>
    <script type="module" src="src/main.tsx"></script>
    <script>
      // Hide fallback after a timeout or when root has content
      setTimeout(() => {
        const root = document.getElementById('root');
        const fallback = document.getElementById('loading-fallback');
        if (root && root.innerHTML.trim() !== '' && fallback) {
          fallback.style.display = 'none';
        }
      }, 3000);
    </script>
  </body>
</html>
